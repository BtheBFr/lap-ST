<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>Lap.ST - СашаТаня</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Lap.<span class="highlight">ST</span></h1>
            <p class="subtitle">от Lap.comp</p>
        </header>

        <main>
            <div class="series-info">
                <h2>Сериал "СашаТаня"</h2>
                <p class="series-description">Выберите сезон для просмотра</p>
            </div>

            <!-- Список сезонов -->
            <div class="seasons-list" id="seasonsList">
                <!-- Сезоны будут загружены из all.js -->
            </div>

            <!-- Список серий (изначально скрыт) -->
            <div class="episodes-section" id="episodesSection" style="display: none;">
                <button class="back-to-seasons" id="backToSeasonsBtn">
                    ← Назад к сезонам
                </button>
                <div class="current-season-title" id="currentSeasonTitle"></div>
                <div class="episodes-grid" id="episodesGrid">
                    <!-- Серии будут загружены динамически -->
                </div>
            </div>
        </main>
    </div>

    <script src="js/all.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
