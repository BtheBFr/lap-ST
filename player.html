<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>Lap.ST - Просмотр</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container player-container">
        <header class="player-header">
            <a href="index.html" class="back-btn">← Назад</a>
            <h1>Lap.<span class="highlight">ST</span></h1>
        </header>

        <main>
            <!-- Выбор качества -->
            <div class="quality-selector" id="qualitySelector" style="display: none;">
                <div class="quality-label">
                    <span>🎬 Качество:</span>
                    <select id="qualitySelect" class="quality-select">
                    </select>
                    <span class="quality-size" id="qualitySize"></span>
                </div>
            </div>

            <!-- Видео плеер - используем iframe для Google Drive -->
            <div class="video-wrapper">
                <iframe id="driveIframe" 
                        src="" 
                        width="100%" 
                        height="100%" 
                        frameborder="0" 
                        allow="autoplay; fullscreen"
                        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
                </iframe>
            </div>
            
            <div class="episode-info" id="episodeInfo">
                <h3 id="episodeTitle"></h3>
                <div class="button-group">
                    <button id="downloadBtn" class="download-btn">
                        📥 Скачать
                    </button>
                    <button id="copyLinkBtn" class="copy-btn">
                        🔗 Копировать ссылку
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/all.js"></script>
    <script src="js/player.js"></script>
</body>
</html>
